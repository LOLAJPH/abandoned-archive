<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>abandoned-archive</title>
<style>
body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
}

#screen {
    padding: 20px;
    white-space: pre-line;
}

#scare {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: black;
}

#scare img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
</style>
</head>

<body>

<div id="screen"></div>

<div id="scare">
    <img src="https://images.unsplash.com/photo-1520975922284-9c7e4f3f7c55?w=1200">
    <audio id="scream" src="https://www.soundjay.com/human/sounds/scream-01.mp3"></audio>
</div>

<script>
const lines = [
"Booting system...",
"Loading archive...",
"Checking files...",
"WARNING: CORRUPTION DETECTED",
"ACCESSING RESTRICTED DATA...",
"DO NOT PROCEED..."
];

let i = 0;
const screen = document.getElementById("screen");

function type() {
    if (i < lines.length) {
        screen.innerHTML += lines[i] + "\n";
        i++;
        setTimeout(type, 1200);
    } else {
        setTimeout(jumpscare, 2000);
    }
}

function jumpscare() {
    document.getElementById("screen").style.display = "none";
    document.getElementById("scare").style.display = "flex";

    const audio = document.getElementById("scream");
    audio.volume = 1;
    audio.play().catch(()=>{});
}

type();
</script>

</body>
</html>
